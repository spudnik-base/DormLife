<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360">
  <rect width="720" height="360" fill="#FFFBF4"/>

  <text x="360" y="34" font-family="Unbounded, 'Segoe UI', sans-serif" font-weight="900" font-size="16" text-anchor="middle" fill="#2B2B3C" letter-spacing="2">DISH DUTY — STICKER VARIATIONS</text>
  <text x="360" y="54" font-family="'DM Sans', sans-serif" font-size="12" text-anchor="middle" fill="#8B8B9E">same module, three directions</text>

  <!-- ══════════════ A — Clean flat (Duolingo / Cash App school) ══════════════ -->
  <g transform="translate(120 180)">
    <ellipse cx="0" cy="54" rx="64" ry="8" fill="#2B2B3C" opacity="0.08"/>

    <!-- bottom plate -->
    <ellipse cx="0" cy="36" rx="70" ry="14" fill="#F5EDB0" stroke="#2B2B3C" stroke-width="4"/>
    <path d="M -70 36 Q -70 48 0 48 Q 70 48 70 36" fill="none" stroke="#2B2B3C" stroke-width="4" stroke-linecap="round"/>

    <!-- middle plate -->
    <ellipse cx="0" cy="10" rx="62" ry="12" fill="#F5EDB0" stroke="#2B2B3C" stroke-width="4"/>
    <path d="M -62 10 Q -62 20 0 20 Q 62 20 62 10" fill="none" stroke="#2B2B3C" stroke-width="4" stroke-linecap="round"/>

    <!-- top plate -->
    <ellipse cx="0" cy="-14" rx="54" ry="11" fill="#F5EDB0" stroke="#2B2B3C" stroke-width="4"/>
    <ellipse cx="0" cy="-14" rx="34" ry="6" fill="none" stroke="#2B2B3C" stroke-width="2.5"/>

    <!-- highlight -->
    <path d="M -30 -18 Q -14 -22 2 -20" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

    <!-- sparkle -->
    <g transform="translate(58 -54)">
      <path d="M 0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z" fill="#7A6BD1"/>
    </g>
  </g>

  <text x="120" y="290" font-family="Unbounded, sans-serif" font-weight="900" font-size="42" text-anchor="middle" fill="#2B2B3C">A</text>
  <text x="120" y="314" font-family="'DM Sans', sans-serif" font-weight="600" font-size="13" text-anchor="middle" fill="#2B2B3C">Clean flat</text>
  <text x="120" y="332" font-family="'DM Sans', sans-serif" font-size="11" text-anchor="middle" fill="#8B8B9E">Uniform stroke · polished · safe</text>

  <!-- ══════════════ B — Chunky illustration (varied weights, active scene) ══════════════ -->
  <g transform="translate(360 180)">
    <ellipse cx="0" cy="54" rx="64" ry="8" fill="#2B2B3C" opacity="0.08"/>

    <!-- tilted plate -->
    <g transform="rotate(-12)">
      <ellipse cx="0" cy="10" rx="72" ry="18" fill="#F5EDB0" stroke="#2B2B3C" stroke-width="5"/>
      <ellipse cx="0" cy="10" rx="52" ry="12" fill="none" stroke="#2B2B3C" stroke-width="2"/>
    </g>

    <!-- sponge -->
    <g transform="translate(-6 -24) rotate(18)">
      <rect x="-30" y="-14" width="60" height="24" rx="6" fill="#F5EDB0" stroke="#2B2B3C" stroke-width="4.5"/>
      <rect x="-30" y="-14" width="60" height="9" rx="5" fill="#FFFFFF" opacity="0.55"/>
      <circle cx="-18" cy="2" r="2" fill="#2B2B3C" opacity="0.35"/>
      <circle cx="-6" cy="6" r="1.6" fill="#2B2B3C" opacity="0.35"/>
      <circle cx="8" cy="0" r="2.2" fill="#2B2B3C" opacity="0.35"/>
      <circle cx="20" cy="5" r="1.8" fill="#2B2B3C" opacity="0.35"/>
    </g>

    <!-- bubbles -->
    <circle cx="40" cy="-44" r="10" fill="#FFFBF4" stroke="#2B2B3C" stroke-width="3"/>
    <circle cx="36" cy="-47" r="2.5" fill="#FFFFFF"/>
    <circle cx="62" cy="-30" r="6" fill="#FFFBF4" stroke="#2B2B3C" stroke-width="2.5"/>
    <circle cx="58" cy="-56" r="4" fill="#FFFBF4" stroke="#2B2B3C" stroke-width="2"/>

    <!-- water drips off plate -->
    <path d="M -54 22 Q -56 30 -52 36" fill="none" stroke="#2B2B3C" stroke-width="2" stroke-linecap="round"/>
    <path d="M -40 30 Q -42 38 -38 42" fill="none" stroke="#2B2B3C" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="360" y="290" font-family="Unbounded, sans-serif" font-weight="900" font-size="42" text-anchor="middle" fill="#2B2B3C">B</text>
  <text x="360" y="314" font-family="'DM Sans', sans-serif" font-weight="600" font-size="13" text-anchor="middle" fill="#2B2B3C">Chunky illustration</text>
  <text x="360" y="332" font-family="'DM Sans', sans-serif" font-size="11" text-anchor="middle" fill="#8B8B9E">Varied line weights · active · Notion-ish</text>

  <!-- ══════════════ C — Wonky marker (hand-drawn, the "most human") ══════════════ -->
  <g transform="translate(600 180)">
    <ellipse cx="2" cy="54" rx="60" ry="6" fill="#2B2B3C" opacity="0.08"/>

    <!-- bottom plate (wobbled path) -->
    <path d="M -66 38 C -70 30, -50 22, -4 24 C 42 26, 68 30, 66 38 C 64 46, 44 50, 0 50 C -44 50, -64 46, -66 38 Z"
          fill="#F5EDB0" stroke="#2B2B3C" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- middle plate (slightly rotated, imperfect oval) -->
    <g transform="rotate(-3)">
      <path d="M -58 12 C -62 4, -42 -4, 2 -2 C 44 0, 62 6, 58 12 C 54 20, 36 22, -4 22 C -38 22, -56 20, -58 12 Z"
            fill="#F5EDB0" stroke="#2B2B3C" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
    </g>

    <!-- top plate with scribbled rim -->
    <g transform="rotate(2)">
      <path d="M -50 -18 C -54 -26, -34 -32, -2 -30 C 36 -28, 52 -24, 50 -18 C 48 -12, 32 -8, -2 -8 C -36 -8, -50 -12, -50 -18 Z"
            fill="#F5EDB0" stroke="#2B2B3C" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M -32 -20 C -20 -24, 0 -25, 14 -23 C 22 -22, 30 -20, 32 -18" fill="none" stroke="#2B2B3C" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- sparkle as hand-drawn asterisk -->
    <g transform="translate(58 -50)" stroke="#7A6BD1" stroke-width="3" stroke-linecap="round">
      <line x1="-8" y1="0" x2="8" y2="0"/>
      <line x1="0" y1="-8" x2="0" y2="8"/>
      <line x1="-6" y1="-6" x2="6" y2="6"/>
    </g>

    <!-- tiny confetti dots (off-grid detail) -->
    <circle cx="-68" cy="-30" r="2" fill="#EDB9BE"/>
    <circle cx="70" cy="20" r="1.8" fill="#BCDCC2"/>
  </g>

  <text x="600" y="290" font-family="Unbounded, sans-serif" font-weight="900" font-size="42" text-anchor="middle" fill="#2B2B3C">C</text>
  <text x="600" y="314" font-family="'DM Sans', sans-serif" font-weight="600" font-size="13" text-anchor="middle" fill="#2B2B3C">Wonky marker</text>
  <text x="600" y="332" font-family="'DM Sans', sans-serif" font-size="11" text-anchor="middle" fill="#8B8B9E">Imperfect strokes · most "not-AI"</text>

  <!-- dividers -->
  <line x1="240" y1="100" x2="240" y2="270" stroke="#2B2B3C" stroke-width="0.5" opacity="0.15" stroke-dasharray="2 4"/>
  <line x1="480" y1="100" x2="480" y2="270" stroke="#2B2B3C" stroke-width="0.5" opacity="0.15" stroke-dasharray="2 4"/>
</svg>
